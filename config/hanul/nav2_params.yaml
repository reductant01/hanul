# =============================================================================
# Nav2 파라미터 (config/hanul/nav2_params.yaml)
# =============================================================================
# loc 모드에서 "Nav2" 터미널 하나가 bringup_launch.py로 아래 노드들을 한 번에 실행합니다.
# 맵 로딩(map_server) + 위치 추정(amcl) + 경로 계획(planner) + 경로 추종(controller) + 목표 처리(bt_navigator) 등.
# 아래 각 블록은 해당 노드/서버에 넘겨지는 설정입니다.
# =============================================================================

# [Nav2 터미널 - 맵/위치] map_server가 맵을 로드한 뒤, AMCL이 라이다/오도메트리로 로봇 위치 추정
# --- 맵 갱신이 안 될 때 확인 ---
# set_initial_pose: true + initial_pose → /initialpose 메시지를 기다리지 않고 바로 포즈 발행. false면 초기 위치를 안 받으면 /amcl_pose가 안 나옴.
# tf_broadcast: true여야 map→odom TF(및 맵 갱신) 발행. false면 맵 기준 위치가 갱신되지 않음.
# map_topic, scan_topic: 공식 기본값은 "map", "scan"(슬래시 없음). 토픽 이름이 다르면 구독 실패해 갱신 안 됨.
# transform_tolerance: 발행하는 TF를 몇 초까지 유효하다고 할지. 너무 작으면 구독 쪽에서 TF를 버려서 맵이 안 따라옴.
# first_map_only: true면 첫 맵만 사용. 맵이 한 번 늦게 오면 false일 때 구독 실패할 수 있음.
amcl:
  ros__parameters:
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: "scan"
    map_topic: "map"
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    tf_broadcast: true
    first_map_only: true
    max_particles: 2000
    min_particles: 500
    transform_tolerance: 0.5
    update_min_d: 0.05
    update_min_a: 0.05
    resample_interval: 1
    robot_model_type: "nav2_amcl::OmniMotionModel"
    alpha1: 0.15
    alpha2: 0.15
    alpha3: 0.15
    alpha4: 0.15
    alpha5: 0.25

# [Nav2 터미널 - 목표 처리] /navigate_to_pose 등 목표를 받아서 planner·controller 호출 순서 제어
bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

# [Nav2 터미널 - 경로 추종] planner가 준 경로를 따라 /cmd_vel로 속도 명령 발행 (장애물 회피 반영)
controller_server:
  ros__parameters:
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 20.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_max: 0.5
      vx_min: -0.35
      vy_max: 0.5
      vy_min: -0.5
      wz_max: 1.9
      vx_std: 0.25
      vy_std: 0.25
      wz_std: 0.5
      transform_tolerance: 5.0
      motion_model: "Omni"
      visualize: false

# [Nav2 터미널 - 로컬 장애물 맵] 로봇 주변만 갱신, controller가 회피에 사용 (라이다 /scan 반영)
# --- 수정한 변수 역할 ---
# update_frequency: 초당 몇 번 costmap을 다시 계산할지(Hz). 높을수록 라이다/위치 반영이 빨라서 저장 맵과 덜 어긋나 보임. 대신 CPU 부하 증가.
# publish_frequency: 초당 몇 번 costmap을 토픽으로 발행할지(Hz). RViz 등에서 보이는 갱신 속도에 영향.
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 15.0
      publish_frequency: 10.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.22
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        observation_sources: scan
        tf_filter_tolerance: 10.0
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.70

# [Nav2 터미널 - 전역 장애물 맵] 맵 전체, planner가 경로 계획할 때 사용 (정적 맵 + 라이다)
# --- 수정한 변수 역할 ---
# update_frequency / publish_frequency: local보다 낮게 둠. 전역 맵은 넓어서 자주 갱신하면 부하 큼. 2Hz면 충분.
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 4.0
      publish_frequency: 4.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        tf_filter_tolerance: 10.0
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.7

# [Nav2 터미널 - 경로 계획] 목표까지 경로 생성 (global_costmap 기반)
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# [Nav2 터미널 - 경로 부드럽게] planner 경로를 부드럽게 해서 controller가 추종하기 쉽게 함
smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# [Nav2 터미널 - 복구 동작] 회전(spin), 후진(backup) 등 경로 실패 시 재시도/복구
behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    robot_base_frame: base_footprint

# [Nav2 터미널 - 속도 완화] controller가 내보낸 /cmd_vel을 완만하게 해서 로봇 구동이 덜 거침 (옴니휠이라 linear.y 허용)
velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.5, 2.0]
    min_velocity: [-0.5, -0.5, -2.0]
    max_accel: [2.5, 2.5, 3.2]
    max_decel: [-2.5, -2.5, -3.2]
    odom_topic: "odom"
    velocity_timeout: 1.0

# [Nav2 터미널 - 충돌 감지] 장애물 접근 시 속도 제한/정지 (enabled: false면 미사용, polygons/observation_sources 필수)
collision_monitor:
  ros__parameters:
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 10.0
    source_timeout: 15.0
    enabled: False
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "polygon"
      points: "[[0.3, 0.2], [0.3, -0.2], [0.0, -0.2], [0.0, 0.2]]"
      action_type: "stop"
      min_points: 4
      visualize: False
      polygon_pub_topic: "polygon_stop"
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"

# [Nav2 터미널 - 도킹] 충전/도킹 미사용이어도 lifecycle에 포함되므로 최소 설정 필수 (dock_plugins + docks)
docking_server:
  ros__parameters:
    controller_frequency: 50.0
    base_frame: "base_footprint"
    fixed_frame: "odom"
    odom_topic: "odom"
    dock_plugins: ["charging_dock"]
    charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_battery_status: false
      use_stall_detection: false
    docks: ["default_dock"]
    default_dock:
      type: "charging_dock"
      frame: "map"
      pose: [0.0, 0.0, 0.0]
      id: "default"

# [Nav2 터미널 - 웨이포인트] 여러 점 순서대로 방문할 때 사용 (navigate_through_poses)
waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

# [맵 저장 시] scripts/hanul/save_hanul_map.sh 또는 --params-file config/hanul/map_saver_params.yaml
map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    map_subscribe_transient_local: True
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
